function initDB(){

function startValidation(){
   
    ensureValidationMeta()  // ✅ ADD THIS
let pidVal = document.getElementById("pid").value
let cxVal = document.getElementById("cx").value
let cityVal = document.getElementById("city").value

if(!pidVal || !cxVal || !cityVal){
    alert("Please fill PID, Cx Name, City")
    return
}

    if(!confirm("Start validation?")){
        return
    }

    data.validationMeta = {
        started: true,
        ended: false,
        excelGenerated: false,
        imagesDownloaded: false,
        startTime: new Date().toLocaleString()
    }

    saveData()

    renderAppSections()
    renderSociety()
    renderTabs(defaultRooms[0])
    openRoom(defaultRooms[0])
}
async function endValidation(){

    if(!data.validationMeta.excelGenerated || !data.validationMeta.imagesDownloaded){
        alert("Please generate Excel and download images before ending validation")
        return
    }

    if(!confirm("End validation and reset app?")){
        return
    }

    // 🔥 STOP unload warning
    window.onbeforeunload = null

    // 🔥 UI BLOCK
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:40px'>Finishing validation...</h2>"

    try{

        // 🔥 FORCE CLOSE DB CONNECTION
        if(db){
            db.close()
        }

        // 🔥 UNREGISTER SERVICE WORKER (CRITICAL FIX)
        if ('serviceWorker' in navigator) {
            let regs = await navigator.serviceWorker.getRegistrations()
            for(let reg of regs){
                await reg.unregister()
            }
        }

        // 🔥 DELETE DATABASE
        let req = indexedDB.deleteDatabase("SiteValidatorDB")

        req.onsuccess = ()=>{
            console.log("DB deleted")

            localStorage.removeItem("dbSizeMB")

         

            location.href = location.origin + location.pathname
        }

        req.onerror = ()=>{
            console.error("Delete failed")

            // 🔥 FALLBACK RESET (VERY IMPORTANT)
            localStorage.clear()

            alert("Validation completed (fallback reset)")

            location.href = location.origin + location.pathname
        }

        req.onblocked = ()=>{
            console.warn("Still blocked — forcing reset")

            // 🔥 FORCE RESET ANYWAY
            localStorage.clear()

            alert("Validation completed (forced reset)")

            location.href = location.origin + location.pathname
        }

    }catch(err){
        console.error(err)

        // 🔥 LAST RESORT
        localStorage.clear()

        alert("Reset completed (safe mode)")

        location.reload()
    }
}
/* =========================
   2. ADD SAVE FUNCTION
========================= */
function saveAppData(){
return new Promise((resolve, reject)=>{

try{

let tx = db.transaction(["appData"], "readwrite")
let store = tx.objectStore("appData")

store.put({
    id: "main",
    data: data
})

tx.oncomplete = ()=>resolve()
tx.onerror = (e)=>{
    console.error("DB WRITE FAILED", e)
    alert("⚠️ Data save failed. Please do not refresh. Try again.")
    reject(e)
}

}catch(err){
    console.error("DB ERROR", err)
    alert("⚠️ Critical storage error")
    reject(err)
}

})
}
/* =========================
   3. ADD LOAD FUNCTION
========================= */
function loadAppData(){
return new Promise((resolve, reject)=>{

let tx = db.transaction(["appData"], "readonly")
let store = tx.objectStore("appData")

let req = store.get("main")

req.onsuccess = ()=>{
resolve(req.result ? req.result.data : null)
}

req.onerror = reject
})
}
 

 
function renderAppSections(){
if(!data.validationMeta || !data.validationMeta.started){
        document.getElementById("validationApp").style.display = "none"
        document.getElementById("startValidationBtn").style.display = "block"
        return
    }
    let app = document.getElementById("validationApp")
    let startBtn = document.getElementById("startValidationBtn")
    let endBtn = document.getElementById("endValidationBtn")

    if(data.validationMeta.started){

        app.style.display = "block"
        startBtn.style.display = "none"

        // ✅ SHOW END ONLY AFTER BOTH DONE
        if(data.validationMeta.excelGenerated && data.validationMeta.imagesDownloaded){
            endBtn.style.display = "inline-block"
        } else {
            endBtn.style.display = "none"
        }

        renderSociety()

        if(roomOrder.length > 0){
            renderTabs(roomOrder[0])
        }

    } else {

        app.style.display = "none"
        startBtn.style.display = "inline-block"
        endBtn.style.display = "none"
    }

    ["pid","cx","city","address","society","flat","floorNo"].forEach(id=>{
        let el = document.getElementById(id)
        if(el) el.disabled = data.validationMeta.started
    })
}

/* 🔥 TOGGLE FUNCTION */
function createToggle(value,onChange){
let div=document.createElement("div")
div.className="toggleGroup"

let options=["Yes","No","NA"]

options.forEach(opt=>{
let btn=document.createElement("div")
btn.className="toggleBtn"
btn.innerText=opt

btn.onclick=()=>{
div.querySelectorAll(".toggleBtn").forEach(b=>b.classList.remove("active","yes","no","na"))

btn.classList.add("active")
btn.classList.add(opt.toLowerCase())

onChange(opt)
}

if(value===opt){
btn.classList.add("active")
btn.classList.add(opt.toLowerCase())
}

div.appendChild(btn)
})

return div
}

function createAccordion(title){
let acc=document.createElement("div")
acc.className="accordion"
acc.textContent=title
let content=document.createElement("div")
content.className="accordionContent"
let isOpen = data.uiState?.[title] || false

acc.onclick=()=>{
isOpen = !isOpen
if(!data.uiState) data.uiState={}
data.uiState[title] = isOpen
content.style.display = isOpen ? "block" : "none"
}
container.appendChild(acc)
container.appendChild(content)

return content
  
}

function processImage(file, surface, room){

let img = new Image()

// 🔥 USE OBJECT URL INSTEAD OF BASE64
let url = URL.createObjectURL(file)

img.src = url

img.onload = function(){

let canvas = document.createElement("canvas")
let ctx = canvas.getContext("2d")

// 🔥 REDUCE SIZE (VERY IMPORTANT FOR MOBILE)
let maxWidth = 800
let scale = maxWidth / img.width

canvas.width = maxWidth
canvas.height = img.height * scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

// 🔥 COMPRESS IMAGE
let compressed = canvas.toDataURL("image/jpeg", 0.4)

// 🔥 CLEAN MEMORY
URL.revokeObjectURL(url)

// 🔥 OPEN EDITOR
openEditorDirect(compressed, surface, room)

}
}
  
async function openEditorDirect(imgSrc, surface, room, index = null){


document.body.style.overflow = "hidden"

let overlay = document.createElement("div")
overlay.style.position = "fixed"
overlay.style.top = 0
overlay.style.left = 0
overlay.style.width = "100%"
overlay.style.height = "100%"
overlay.style.background = "#000"
overlay.style.zIndex = 9999

overlay.innerHTML = `
<div style="position:absolute;top:10px;left:10px;z-index:10;">
<button id="drawBtn">Draw</button>
<button id="textBtn">Text</button>
<button id="saveBtn">Save</button>
<button id="closeBtn">Close</button>
</div>

<canvas id="editorCanvas"></canvas>
`

document.body.appendChild(overlay)
 isCameraOpen = true
history.pushState({ editor: true }, "")
let canvas = overlay.querySelector("#editorCanvas")
let ctx = canvas.getContext("2d")

canvas.style.touchAction = "none"
  /* CLOSE */
overlay.querySelector("#closeBtn").onclick = () => {
    document.body.style.overflow = "auto"
    canvas.replaceWith(canvas.cloneNode(true))
    document.body.removeChild(overlay)

    isCameraOpen = false

    history.back()
}

  
/* SAVE */

overlay.querySelector("#saveBtn").onclick = async () => {

    // 🔥 ENSURE DB IS READY (ADD THIS)
    if(!db){
        await initDB()
    }

    if(approxSizeMB > 80){
        alert("Storage almost full. Please delete some images.")
        return
    }
let btn = overlay.querySelector("#saveBtn")
btn.innerText = "Saving..."
btn.disabled = true

try{

let finalImg = canvas.toDataURL("image/jpeg", 0.7)

let id = "img_" + Date.now()

await savePhotoToDB(id, finalImg)
approxSizeMB += finalImg.length / (1024*1024)
localStorage.setItem("dbSizeMB", approxSizeMB)

if(index !== null){
data.rooms[room].photos[surface][index] = id
}else{
data.rooms[room].photos[surface].push(id)
}

saveData()
refreshPhotoSection(room)

document.body.style.overflow = "auto"
canvas.replaceWith(canvas.cloneNode(true))
document.body.removeChild(overlay)

}catch(err){
console.error(err)
alert("Error saving image")
btn.innerText = "Save"
btn.disabled = false
}
}
/* 🔥 CRITICAL: STOP SCROLL + ZOOM */


/* STATE */
let mode = "draw"
let drawing = false
function getCoords(e){
const rect = canvas.getBoundingClientRect()

const scaleX = canvas.width / rect.width
const scaleY = canvas.height / rect.height

return {
x: (e.clientX - rect.left) * scaleX,
y: (e.clientY - rect.top) * scaleY
}
}
/* LOAD IMAGE */
let img = new Image()
img.src = imgSrc

img.onerror = ()=>{
alert("Image failed to load")
document.body.removeChild(overlay)
}

img.onload = ()=>{
canvas.width = img.width*0.9
canvas.height = img.height*0.9

canvas.style.width = "100%"
canvas.style.height = "auto"

ctx.drawImage(img, 0, 0)
}

/* BUTTONS */
overlay.querySelector("#drawBtn").onclick = () => mode = "draw"
overlay.querySelector("#textBtn").onclick = () => mode = "text"

/* DRAW (WORKS ON MOBILE + DESKTOP) */
canvas.addEventListener("pointerdown", (e)=>{
if(mode !== "draw") return

drawing = true
canvas.setPointerCapture(e.pointerId)

ctx.beginPath()
let p = getCoords(e)
ctx.moveTo(p.x, p.y)
})

canvas.addEventListener("pointermove", (e)=>{
if(!drawing || mode !== "draw") return

ctx.lineCap = "round"
ctx.lineJoin = "round"
ctx.strokeStyle = "red"
// 🔥 Dynamic thickness
ctx.lineWidth = Math.max(3, canvas.width / 200)


let p = getCoords(e)

ctx.lineTo(p.x, p.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(p.x, p.y)
})

canvas.addEventListener("pointerup", (e)=>{
drawing = false
try{ canvas.releasePointerCapture(e.pointerId) }catch(err){}
})

canvas.addEventListener("pointercancel", ()=>{
drawing = false
})

/* TEXT */
canvas.addEventListener("click", (e)=>{
if(mode === "text"){
let txt = prompt("Enter note")
if(txt){
ctx.fillStyle = "red"
// 🔥 Dynamic font
ctx.font = `${Math.max(20, canvas.width / 25)}px Arial`
let p = getCoords(e)
ctx.fillText(txt, p.x, p.y)
}
}
})


}

function startVersionWatcher(){

    setTimeout(async ()=>{

        try{
            let res = await fetch("version.txt?v=" + Date.now())
            let serverVersion = (await res.text()).trim()

            let localVersion = localStorage.getItem("appVersion")

            console.log("INIT CHECK → LOCAL:", localVersion, "SERVER:", serverVersion)

            // 🔥 FIRST TIME SYNC
            if(!localVersion){
                localStorage.setItem("appVersion", serverVersion)
                return
            }

            // 🔥 IF DIFFERENT → TRIGGER UPDATE
            if(serverVersion !== localVersion){
                showUpdateBanner(serverVersion)
            }

        }catch(err){
            console.log("Initial version check failed", err)
        }

    }, 1000)


    // 🔁 CONTINUOUS WATCH
    setInterval(async ()=>{

        try{
            let res = await fetch("version.txt?v=" + Date.now())
            let newVersion = (await res.text()).trim()

            let oldVersion = localStorage.getItem("appVersion")

            console.log("CHECK → OLD:", oldVersion, "NEW:", newVersion)

            if(newVersion !== oldVersion){
                showUpdateBanner(newVersion)
            }

        }catch(err){
            console.log("Version check failed", err)
        }

    }, 5000)
}
let updateShown = false

function showUpdateBanner(newVersion){

    if(updateShown) return
    updateShown = true

    let oldVersion = localStorage.getItem("appVersion")

    let confirmUpdate = confirm(
        `New version available.\n\nCurrent: ${oldVersion}\nNew: ${newVersion}\n\nClick OK to update.`
    )

    if(confirmUpdate){
        localStorage.setItem("appVersion", newVersion)
        window.onbeforeunload = null
        location.reload(true)
    }
}  
async function openCamera(surface, room){

    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){

        try{
            let stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            })

            let overlay = document.createElement("div")
            overlay.style.position = "fixed"
            overlay.style.top = 0
            overlay.style.left = 0
            overlay.style.width = "100%"
            overlay.style.height = "100%"
            overlay.style.background = "#000"
            overlay.style.zIndex = 9999

            overlay.innerHTML = `
                <video autoplay playsinline style="width:100%"></video>
                <div style="position:fixed;bottom:20px;width:100%;text-align:center;">
                    <button id="captureBtn">Capture</button>
                    <button id="closeCam">Close</button>
                </div>
            `

            document.body.appendChild(overlay)
            isCameraOpen = true

            // 🔥 PUSH STATE
            history.pushState({ camera: true }, "")

            let video = overlay.querySelector("video")
            video.srcObject = stream

            overlay.querySelector("#captureBtn").onclick = () => {

                let canvas = document.createElement("canvas")
                canvas.width = video.videoWidth
                canvas.height = video.videoHeight

                let ctx = canvas.getContext("2d")
                ctx.drawImage(video, 0, 0)

                let img = canvas.toDataURL("image/jpeg", 0.7)

                stream.getTracks().forEach(t => t.stop())
                document.body.removeChild(overlay)

                openEditorDirect(img, surface, room)
            }

           overlay.querySelector("#closeCam").onclick = () => {
    stream.getTracks().forEach(t => t.stop())
    document.body.removeChild(overlay)

    isCameraOpen = false

    // 🔥 FIX BACK STACK
    history.back()
}

            return

        }catch(e){
            console.log("Camera fallback", e)
        }
    }

    // fallback
    let input = document.createElement("input")
    input.type = "file"
    input.accept = "image/*"
    input.capture = "environment"

    input.onchange = function(e){
        let file = e.target.files[0]
        if(file){
            processImage(file, surface, room)
        }
    }

    input.click()
}

async function downloadAllImages(){

    let zip = new JSZip()

    // 🔥 FILE NAME
    let pid = data.project?.pid || "PID"
    let cx = data.project?.cx || "Cx"

    pid = pid.replace(/[^a-zA-Z0-9]/g, "_")
    cx = cx.replace(/[^a-zA-Z0-9]/g, "_")

    let zipName = `${pid}_${cx}_photos.zip`

    // 🔥 COUNT TOTAL IMAGES
    let total = 0
    for(let room in data.rooms){
        for(let surface in data.rooms[room].photos){
            total += (data.rooms[room].photos[surface] || []).length
        }
    }

    let processed = 0

    // 🔥 SHOW LOADER
    let loader = document.getElementById("zipLoader")
    let text = document.getElementById("zipText")

    loader.style.display = "flex"
    text.innerText = `Zipping images: 0 / ${total}`

    for(let room in data.rooms){

      let cleanRoom = room.replace(/[^a-zA-Z0-9]/g, "_")
      let roomFolder = zip.folder(cleanRoom)
        let r = data.rooms[room]

        for(let surface in r.photos){

            let photos = r.photos[surface] || []

            for(let i=0;i<photos.length;i++){

                let id = photos[i]

                let src = await getPhotoFromDB(id)
                if(!src) continue

                let blob = await fetch(src).then(res => res.blob())

                let cleanRoom = room.replace(/[^a-zA-Z0-9]/g, "_")
let fileName = `${cleanRoom}_${surface}_${i+1}.jpg`

                roomFolder.file(fileName, blob)

                // 🔥 UPDATE PROGRESS
                processed++
                text.innerText = `Zipping images: ${processed} / ${total}`
            }
        }
    }

    text.innerText = "Finalizing ZIP..."

    let content = await zip.generateAsync({type:"blob"})

    let a = document.createElement("a")
    a.href = URL.createObjectURL(content)
    a.download = zipName
    a.click()

    // 🔥 HIDE LOADER
    loader.style.display = "none"

    alert("Images downloaded successfully ✅")

    data.validationMeta.imagesDownloaded = true
    saveData()
    renderAppSections()
}
