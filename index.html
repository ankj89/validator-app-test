function getRoomType(room){
if(!room) return ""

let r = room.toLowerCase()

// 🔥 REMOVE SPECIAL CHARACTERS
r = r.replace(/[^a-z0-9]/g, "")

if(r.includes("bedroom")) return "Bedroom"
 if(r.includes("passage")) return "Living Room"
 if(r.includes("guest")) return "Bedroom"
  if(r.includes("kid's")) return "Bedroom"
  if(r.includes("kids")) return "Bedroom"
  if(r.includes("kid")) return "Bedroom"
  if(r.includes("play")) return "Bedroom"
if(r.includes("bed")) return "Bedroom"
if(r.includes("bath")) return "Bathroom"
 if(r.includes("bathroom")) return "Bathroom"
if(r.includes("toilet")) return "Bathroom"
if(r.includes("kitchen")) return "Kitchen"
if(r.includes("living")) return "Living Room"
 if(r.includes("hall")) return "Living Room"
if(r.includes("store")) return "Living Room"
 if(r.includes("pooja")) return "Living Room"
 if(r.includes("mandir")) return "Living Room"
 if(r.includes("staircase")) return "Living Room"
 if(r.includes("stairs")) return "Living Room"
  if(r.includes("stair")) return "Living Room"
 if(r.includes("drawing")) return "Living Room"
if(r.includes("dining")) return "Living Room"
if(r.includes("foyer")) return "Living Room"
 if(r.includes("entrance")) return "Living Room"
if(r.includes("washroom")) return "Bathroom"
 if(r.includes("utility")) return "Balcony"
  if(r.includes("balcony")) return "Balcony"
  if(r.includes("terrace")) return "Balcony" 
return room // exact match fallback
}
function getRoomQuestions(room){

let type = getRoomType(room)

if(questionConfig[type]?.room){
    return questionConfig[type].room
}

return roomQuestions || [] // fallback (your full list)
}

function getWallQuestions(room){

let type = getRoomType(room)

if(questionConfig[type]?.wall){
    return questionConfig[type].wall
}

return wallQuestions // fallback
}

function initDB(){

return new Promise((resolve, reject)=>{

    let request = indexedDB.open("SiteValidatorDB", 2)

    let resolved = false   // 🔥 track success

    /* 🔴 UPGRADE */
    request.onupgradeneeded = function(e){
        db = e.target.result

        if(!db.objectStoreNames.contains("photos")){
            db.createObjectStore("photos", { keyPath: "id" })
        }

        if(!db.objectStoreNames.contains("appData")){
            db.createObjectStore("appData", { keyPath: "id" })
        }
    }

    /* ✅ SUCCESS */
    request.onsuccess = function(e){
        db = e.target.result
        resolved = true
        resolve()
    }

    /* ❌ ERROR */
    request.onerror = function(e){
        console.error("DB error", e)
        alert("⚠️ Storage error. Reloading app...")
        reject(e)
        location.reload()
    }

    /* 🚫 BLOCKED (VERY IMPORTANT) */
    request.onblocked = function(){
        console.error("DB blocked")

        alert(
            "⚠️ App update detected.\n\n" +
            "Please close all other tabs of this app and reload."
        )

        // 🔁 force reload after delay
        setTimeout(()=>{
            location.reload()
        }, 2000)
    }

    /* ⏱️ FAILSAFE TIMEOUT (CRITICAL) */
    setTimeout(()=>{
        if(!resolved){
            console.error("DB init timeout")

            alert(
                "⚠️ App storage not responding.\n\n" +
                "Reloading app..."
            )

            location.reload()
        }
    }, 3000)

})
}

function getElevations(room){

let r = data.rooms[room]

if(!r.elevations || !r.elevations.length){

let input = prompt(
"Enter elevation names (comma separated)\nExample: 1-A, 1-B, Window, Entry"
)

if(!input){
    alert("Please enter at least 1 elevation")
    return getElevations(room)
}

let arr = input
.split(",")
.map(x => x.trim())
.filter(x => x)   // remove empty

if(!arr.length){
    alert("Invalid input")
    return getElevations(room)
}

/* ✅ KEEP EXACT USER INPUT */
r.elevations = [...new Set(arr)]

/* 🔥 INIT PHOTO BUCKETS */
if(!r.photos) r.photos = {}

r.elevations.forEach(e=>{
if(!r.photos[e]) r.photos[e] = []
})

saveData()
}

return r.elevations
}

async function endValidation(){
await new Promise(r => setTimeout(r, 300))
    if(!data.validationMeta.excelGenerated || !data.validationMeta.imagesDownloaded){
        alert("Please generate Excel and download images before ending validation")
        return
    }

    if(!confirm("End validation and reset app?")){
        return
    }

    // 🔥 STOP unload warning
    window.onbeforeunload = null

    // 🔥 UI BLOCK
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:40px'>Finishing validation...</h2>"

    try{

        // 🔥 FORCE CLOSE DB CONNECTION
        if(db){
            db.close()
        }

        // 🔥 UNREGISTER SERVICE WORKER (CRITICAL FIX)
        if ('serviceWorker' in navigator) {
            let regs = await navigator.serviceWorker.getRegistrations()
            for(let reg of regs){
                await reg.unregister()
            }
        }

        // 🔥 DELETE DATABASE
        let req = indexedDB.deleteDatabase("SiteValidatorDB")

        req.onsuccess = ()=>{
            console.log("DB deleted")

            localStorage.removeItem("dbSizeMB")

         

            location.href = location.origin + location.pathname
        }

        req.onerror = ()=>{
            console.error("Delete failed")

            // 🔥 FALLBACK RESET (VERY IMPORTANT)
            localStorage.clear()

            alert("Validation completed (fallback reset)")

            location.href = location.origin + location.pathname
        }

        req.onblocked = ()=>{
            console.warn("Still blocked — forcing reset")

            // 🔥 FORCE RESET ANYWAY
            localStorage.clear()

            alert("Validation completed (forced reset)")

            location.href = location.origin + location.pathname
        }

    }catch(err){
        console.error(err)

        // 🔥 LAST RESORT
        localStorage.clear()

        alert("Reset completed (safe mode)")

        location.reload()
    }
}

function calculateProgress(room){

let r = data.rooms[room]
let rq = getRoomQuestions(room)
let wq = getWallQuestions(room)

let total = rq.length + wq.length

rq.forEach(q=>{

})

wq.forEach(q=>{
if(r.wall[q] || (r.wallSel[q] && r.wallSel[q].length)) answered++
})

return Math.round((answered / total) * 100)
}

function processImage(file, surface, room){

img.onload = function(){
if(img.width > 2000){
    alert("Image too large. Please reduce camera resolution.")
    return
}
 
let canvas = document.createElement("canvas")
let ctx = canvas.getContext("2d")

// 🔥 REDUCE SIZE (VERY IMPORTANT FOR MOBILE)
canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0,canvas.width,canvas.height)

// 🔥 COMPRESS IMAGE
let compressed = canvas.toDataURL("image/jpeg", 0.5)

// 🔥 CLEAN MEMORY
URL.revokeObjectURL(url)

// 🔥 OPEN EDITOR
openEditorDirect(compressed, surface, room)

}
}

}

/* BUTTONS */
overlay.querySelector("#drawBtn").onclick = () => mode = "draw"
overlay.querySelector("#textBtn").onclick = () => mode = "text"

/* DRAW (WORKS ON MOBILE + DESKTOP) */


canvas.addEventListener("pointerdown", (e)=>{
    if(mode !== "draw") return

    drawing = true

    const p = getCoords(e)

    ctx.beginPath()
    ctx.moveTo(p.x, p.y)
})

canvas.addEventListener("pointermove", (e)=>{
    if(!drawing || mode !== "draw") return

    const p = getCoords(e)

    ctx.lineTo(p.x, p.y)

    ctx.strokeStyle = "red"
    ctx.lineWidth = 4
    ctx.lineCap = "round"
    ctx.lineJoin = "round"

    ctx.stroke()
})

canvas.addEventListener("pointerup", ()=>{
    drawing = false
    ctx.closePath()
})

canvas.addEventListener("pointercancel", ()=>{
    drawing = false
    ctx.closePath()
})


 

/* TEXT */
canvas.addEventListener("pointerdown", (e)=>{

    if(mode !== "text") return

    // 🔥 STOP DRAW FROM ALSO TRIGGERING
    e.preventDefault()

    let txt = prompt("Enter note")

    if(txt){

        const p = getCoords(e)

        ctx.fillStyle = "red"
        ctx.font = `${Math.max(20, canvas.width / 25)}px Arial`
        ctx.textBaseline = "top"

        ctx.fillText(txt, p.x, p.y)
    }

})


}

function startVersionWatcher(){

    setTimeout(async ()=>{

        try{
            let res = await fetch("version.txt?v=" + Date.now())
            let serverVersion = (await res.text()).trim()

            let localVersion = localStorage.getItem("appVersion")

            console.log("INIT CHECK → LOCAL:", localVersion, "SERVER:", serverVersion)

            // 🔥 FIRST TIME SYNC
            if(!localVersion){
                localStorage.setItem("appVersion", serverVersion)
                return
            }

            // 🔥 IF DIFFERENT → TRIGGER UPDATE
            if(serverVersion !== localVersion){
                showUpdateBanner(serverVersion)
            }

        }catch(err){
            console.log("Initial version check failed", err)
        }

    }, 1000)


    // 🔁 CONTINUOUS WATCH
    setInterval(async ()=>{

        try{
            let res = await fetch("version.txt?v=" + Date.now())
            let newVersion = (await res.text()).trim()

            let oldVersion = localStorage.getItem("appVersion")

            console.log("CHECK → OLD:", oldVersion, "NEW:", newVersion)

            if(newVersion !== oldVersion){
                showUpdateBanner(newVersion)
            }

        }catch(err){
            console.log("Version check failed", err)
        }

    }, 5000)
}
let updateShown = false

function showUpdateBanner(newVersion){

    if(updateShown) return
    updateShown = true

    let oldVersion = localStorage.getItem("appVersion")

    let confirmUpdate = confirm(
        `New version available.\n\nCurrent: ${oldVersion}\nNew: ${newVersion}\n\nClick OK to update.`
    )

    if(confirmUpdate){
        localStorage.setItem("appVersion", newVersion)
        window.onbeforeunload = null
        location.reload(true)
    }
}

async function downloadAllImages(){

    let zip = new JSZip()

    // 🔥 FILE NAME
    let pid = data.project?.pid || "PID"
    let cx = data.project?.cx || "Cx"

    pid = pid.replace(/[^a-zA-Z0-9]/g, "_")
    cx = cx.replace(/[^a-zA-Z0-9]/g, "_")

    let zipName = `${pid}_${cx}_photos.zip`

    // 🔥 COUNT TOTAL IMAGES
    let total = 0
    for(let room in data.rooms){
        for(let surface in data.rooms[room].photos){
            total += (data.rooms[room].photos[surface] || []).length
        }
    }

    let processed = 0

    // 🔥 SHOW LOADER
    let loader = document.getElementById("zipLoader")
    let text = document.getElementById("zipText")

    loader.style.display = "flex"
    text.innerText = `Zipping images: 0 / ${total}`

    for(let room in data.rooms){

      let cleanRoom = room.replace(/[^a-zA-Z0-9]/g, "_")
      let roomFolder = zip.folder(cleanRoom)
        let r = data.rooms[room]

        for(let surface in r.photos){

            let photos = r.photos[surface] || []

            for(let i=0;i<photos.length;i++){

                let id = photos[i]

                let src = await getPhotoFromDB(id)
                if(!src) continue

                let blob = await fetch(src).then(res => res.blob())

                let cleanRoom = room.replace(/[^a-zA-Z0-9]/g, "_")
let fileName = `${cleanRoom}_${surface}_${i+1}.jpg`

                roomFolder.file(fileName, blob)

                // 🔥 UPDATE PROGRESS
                processed++
                text.innerText = `Zipping images: ${processed} / ${total}`
            }
        }
    }

    text.innerText = "Finalizing ZIP..."

    let content = await zip.generateAsync({type:"blob"})

    let url = URL.createObjectURL(content)

if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
    alert("On iPhone: tap Share → Save to Files to download")
    window.open(url)
}else{
    let a = document.createElement("a")
    a.href = url
    a.download = zipName
    a.click()
}

    // 🔥 HIDE LOADER
    loader.style.display = "none"

    alert("Images downloaded successfully ✅")

    data.validationMeta.imagesDownloaded = true
    saveData()
    renderAppSections()
}
