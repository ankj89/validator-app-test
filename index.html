<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Livspace-Site Validation Tool</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#1e3d8f;color:white;padding:14px;font-size:18px}
.container{padding:14px;max-width:1200px;margin:auto}
.card{background:white;padding:16px;margin-bottom:14px;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

label{font-weight:600;font-size:13px}
input,textarea{width:100%;padding:6px;border-radius:6px;border:1px solid #ccc}
textarea{height:50px}

button{padding:8px 12px;border:none;background:#1e3d8f;color:white;border-radius:6px;margin:4px;cursor:pointer}

.roomTab{display:inline-block;padding:8px 12px;border:1px solid #ccc;margin:3px;border-radius:6px;cursor:pointer}

.wallBox{display:flex;gap:12px;margin-top:6px}

.accordion{cursor:pointer;background:#eef2ff;padding:10px;border-radius:6px;margin-top:10px}
.accordionContent{display:none;padding-top:10px}

.questionBlock{padding:8px;border-radius:6px;margin-bottom:8px}
.statusAnswered{background:#e6f7e6}
.statusPending{background:#ffe6e6}

.progressBar{height:8px;background:#ddd;border-radius:4px;margin-top:6px}
.progressFill{height:100%;background:#1e3d8f;border-radius:4px}

.summaryBox{background:#f9fafc;padding:10px;border-radius:6px;margin-bottom:10px}

/* 🔥 TOGGLE */
.toggleGroup{display:flex;gap:6px;margin-top:6px}
.toggleBtn{padding:6px 10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff}
.toggleBtn.active.yes{background:#28a745;color:#fff}
.toggleBtn.active.no{background:#dc3545;color:#fff}
.toggleBtn.active.na{background:#6c757d;color:#fff}
</style>
</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">
<h3>Preliminary Project Details</h3>
<div style="display:flex;flex-direction:column;gap:12px;">
<input id="pid" placeholder="PID" onchange="saveData()">
<input id="cx" placeholder="Cx Name" onchange="saveData()">
<input id="city" placeholder="City" onchange="saveData()">
<input id="address" placeholder="Address" onchange="saveData()">
<input id="society" placeholder="Society Name" onchange="saveData()">
<input id="flat" placeholder="Flat No" onchange="saveData()">
<input id="floorNo" placeholder="Floor No" onchange="saveData()">
</div>
</div>
  
<div class="card">
<h3>Society Constraints</h3>
<div id="societyForm" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>




</div>

<div class="card">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
<button onclick="resetData()">Reset Data</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">
<button onclick="generateExcel()">Generate Excel</button>
</div>

</div>

<script>
const societyQuestions = [
{key:"propertyType", label:"What is the type of property?", options:["Bare Shell","Property Less than 15 yrs","Property More than 15 yrs"]},
{key:"serviceLiftUsage", label:"Service lift usage allowed?", options:["Yes,Heavy material movement allowed","Yes,Heavy material movement Not allowed","No"]},
{key:"loadingArea", label:"Debris/material loading area present?", options:["Within 30 ft","More than 30 ft","Not present"]},
{key:"societyDemolish", label:"What kind of demolition is allowed?", options:["Mechanical","Manual","Mechanical or Manual"]},
{key:"vehicleEntry", label:"Vehicle entry allowed inside the premises?", options:["Yes,small size","Yes,medium size","Yes,large size","No"]},
{key:"waterPoint", label:"Is there active water supply point at site location?", options:["Yes","No"]},
{key:"electricPoint", label:"Is there active power supply at site location?", options:["Yes","No"]},
{key:"workNOC", label:"Any NOC required to do internal modifications to the property?", options:["Yes","No"]},
{key:"societyRestrictions", label:"Please mention any other society restrictions", type:"textarea"},
{key:"societyWorktimings", label:"Please mention permissible work days and timings (e.g. Monday to Saturday, 10 AM to 2 PM, 4 PM to 8 PM)", type:"textarea"}                                                                     
];
  
const walls=["NW","EW","SW","WW"]
/* 🔥 MEASUREMENT CONFIG */

const measurementFields = [

/* FLOOR TO CEILING */
{label:"Floor to Ceiling - Corner 1", key:"fc1"},
{label:"Floor to Ceiling - Corner 2", key:"fc2"},
{label:"Floor to Ceiling - Corner 3", key:"fc3"},
{label:"Floor to Ceiling - Corner 4", key:"fc4"},
{label:"Floor to Ceiling - Center", key:"fc5"},

/* ROOM DIAGONALS */
{label:"Room Diagonal 1", key:"diag1"},
{label:"Room Diagonal 2", key:"diag2"},

/* WALL UNDULATION */
{label:"Wall Undulation NW", key:"undNW"},
{label:"Wall Undulation EW", key:"undEW"},
{label:"Wall Undulation SW", key:"undSW"},
{label:"Wall Undulation WW", key:"undWW"},

/* 🔥 NEW ADDITIONS */

/* CEILING UTILITIES */
{label:"Beam Bottom to Floor (mm)", key:"beamFloor"},
{label:"Sprinkler Head to Floor (mm)", key:"sprinklerFloor"},

/* SOFFIT (WALL-WISE) */
{label:"Door Soffit to Ceiling - NW", key:"soffitNW"},
{label:"Door Soffit to Ceiling - EW", key:"soffitEW"},
{label:"Door Soffit to Ceiling - SW", key:"soffitSW"},
{label:"Door Soffit to Ceiling - WW", key:"soffitWW"},

/* WINDOW SOFFIT */
{label:"Window Soffit to Ceiling - NW", key:"winSoffitNW"},
{label:"Window Soffit to Ceiling - EW", key:"winSoffitEW"},
{label:"Window Soffit to Ceiling - SW", key:"winSoffitSW"},
{label:"Window Soffit to Ceiling - WW", key:"winSoffitWW"}

]

const roomQuestions=[
"Existing flooring in Good condition with with appropriate slope/levels? Capture Floor levels in Measurement Section",
"Can we do tile on tile installation?", 
"Are existing walls in plumb/line and level? Capture Room diagonals in Measurement Section", 
"Is there level difference in the True ceiling?Capture Floor to ceiling measurement in 4 corners and center in measurement section",
"Are there any issues with the existing false ceiling that require removal and replacement?",                   
"Are there visible undulations/uneven surface on the True Ceiling?Mention treatment required in comments",
"Are there any utilities (sprinkler pipes, plumbing line, ducts) or cross beams running on the ceiling? Capture the beam bottom to floor mesurement(in mm), Sprinkler head to Floor measurement(in mm) and provide in the comments",
"Is there any evidence of water leaks or moisture damage on the existing true ceiling?Mark on the layout as well and inform Cx",                    
"Are the existing doors and door frame in good condition?",
"Are the existing windows and window frames in good condition?",
"Is existing wiring in good condition and does not require replacement?", 
"Does the existing circuit have sufficient load capacity or will require change or new circuit?",                 
"Are there any issues with the existing plumbing lines, such as leaks etc that require replacement or repair?",
"Are existing plumbing lines old and outdated and may not be compatible with modern fixtures?",
"Is the main inlet valve accesible?",
"Is there sufficent space to provide Shower cubicle?",
"Is it possible to relocate the WC, without any modifications to external pipeline/drain line?"]
const wallQuestions=["Is the wall a load-bearing wall/Mivan Construction/Sheer wall?Mark in the structural layout as well",
"Is the wall dry wall/Gypsum wall?Mark in the structural layout as well",
"Are there major cracks that require structural repair?Mark in the structural layout as well",
"Are there Hairline crack/minor cracks/loose plaster requiring re plastering?? Mark in the structural layout as well",
"Does the existing wall surface have undulations or uneven surface?Capture mesurements in measurement section",
"Are there evidence of water seepage,dampness that require waterproofing treatment? Mark on the structural layout as well and inform Cx",
"Is there a suitable location for core cut available?",
"Are existing switch/socket in working condition?Capture Wall wise Modules and configuration in the comments and mark on layout",
"Is there a AC point(low side works) provided?",
"Can split AC be installed post false ceiling w/o pockets? Capture Wall wise Door/Window Soffit to Ceiling measurement in mesurement section",
"Is panelling/pelmet required to be done for AC installation?",
"Are there any darker shade on the wall?",
"Is the existing paint in good condition, without excessive peeling, flaking, or bubbling?",
"Do we need to remove skirting for wardrobe installlation?"]

const defaultRooms=["Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"]

let roomOrder=[...defaultRooms]
let data=JSON.parse(localStorage.getItem("validatorData")||"{}")

function normalizeData(){
if(!data.rooms)data.rooms={}
defaultRooms.forEach(r=>{
if(!data.rooms[r])data.rooms[r]={room:{},wall:{},wallSel:{},measurement:{},photos: {
  "NW": [],
  "EW": [],
  "SW": [],
  "WW": [],
  "Ceiling": [],
  "Floor": []
}}
})
}
normalizeData()

function saveData(){
data.project={pid:pid.value,cx:cx.value,city:city.value,address:address.value,society:society.value,flat:flat.value,floorNo:floorNo.value}
data.constraints={}

societyQuestions.forEach(q=>{
let el=document.getElementById(q.key)
if(el) data.constraints[q.key]=el.value
})
localStorage.setItem("validatorData",JSON.stringify(data))
}

function renderTabs(activeRoom){

const container = document.getElementById("roomTabs")

container.innerHTML = roomOrder.map(r=>`
<span class="roomTab" 
style="${r===activeRoom ? 'background:#1e3d8f;color:white' : ''}"
onclick="openRoom('${r}')">
${r}
</span>
`).join("");

}

function scrollToNext(currentDiv){
let all=document.querySelectorAll(".statusPending")
for(let el of all){
if(el.offsetTop>currentDiv.offsetTop){
el.scrollIntoView({behavior:"smooth",block:"center"})
break
}
}
}

/* 🔥 TOGGLE FUNCTION */
function createToggle(value,onChange){
let div=document.createElement("div")
div.className="toggleGroup"

let options=["Yes","No","NA"]

options.forEach(opt=>{
let btn=document.createElement("div")
btn.className="toggleBtn"
btn.innerText=opt

btn.onclick=()=>{
div.querySelectorAll(".toggleBtn").forEach(b=>b.classList.remove("active","yes","no","na"))

btn.classList.add("active")
btn.classList.add(opt.toLowerCase())

onChange(opt)
}

if(value===opt){
btn.classList.add("active")
btn.classList.add(opt.toLowerCase())
}

div.appendChild(btn)
})

return div
}

function applyAllWalls(value, room){
const r=data.rooms[room]
wallQuestions.forEach(q=>{r.wall[q]=value})
saveData()
openRoom(room)
}

function openRoom(room){

const r=data.rooms[room]
renderTabs(room)

const container=document.getElementById("roomForm")
container.innerHTML=""

function createAccordion(title){
let acc=document.createElement("div")
acc.className="accordion"
acc.textContent=title
let content=document.createElement("div")
content.className="accordionContent"
acc.onclick=()=>{content.style.display=content.style.display==="block"?"none":"block"}
container.appendChild(acc)
container.appendChild(content)
return content
}

/* WALL */
let wallSection=createAccordion("Wall Questions")

wallSection.innerHTML+=`
<button onclick="applyAllWalls('Yes','${room}')">Apply Yes to All</button>
<button onclick="applyAllWalls('No','${room}')">Apply No to All</button>
`

wallQuestions.forEach(q=>{
let div=document.createElement("div")
div.className="questionBlock "+(r.wall[q]?"statusAnswered":"statusPending")

let label=document.createElement("label")
label.textContent=q

let toggle=createToggle(r.wall[q], val=>{
r.wall[q]=val
saveData()
div.className="questionBlock "+(val?"statusAnswered":"statusPending")
scrollToNext(div)
})

let wallBox=document.createElement("div")
wallBox.className="wallBox"

walls.forEach(w=>{
let cb=document.createElement("input")
cb.type="checkbox"
let arr=r.wallSel[q]||[]
cb.checked=arr.includes(w)

cb.onchange=()=>{
let arr=r.wallSel[q]||[]
if(cb.checked){if(!arr.includes(w))arr.push(w)}
else{arr=arr.filter(x=>x!==w)}
r.wallSel[q]=arr
saveData()
}
wallBox.append(cb,w)
})

let textarea=document.createElement("textarea")
textarea.value=r.wall[q+"-c"]||""

textarea.oninput=()=>{
r.wall[q+"-c"]=textarea.value
saveData()
}

div.append(label,toggle,wallBox,textarea)
wallSection.appendChild(div)
})

/* ROOM */
let roomSection=createAccordion("Room Questions")

roomQuestions.forEach(q=>{
let div=document.createElement("div")
div.className="questionBlock "+(r.room[q]?"statusAnswered":"statusPending")

let label=document.createElement("label")
label.textContent=q

let toggle=createToggle(r.room[q], val=>{
r.room[q]=val
saveData()
div.className="questionBlock "+(val?"statusAnswered":"statusPending")
scrollToNext(div)
})

let textarea=document.createElement("textarea")
textarea.value=r.room[q+"-c"]||""

textarea.oniput=()=>{
r.room[q+"-c"]=textarea.value
saveData()
}

div.append(label,toggle,textarea)
roomSection.appendChild(div)
})
/* 🔥 MEASUREMENT SECTION */
let measureSection=createAccordion("Measurement Section")

let m = r.measurement || {}
r.measurement = m

function createInput(labelText,key){

let div=document.createElement("div")
div.className="questionBlock"

let label=document.createElement("label")
label.innerText=labelText

let input=document.createElement("input")
input.type="number"
input.placeholder="mm"
input.value=m[key] || ""

input.onchange=()=>{
m[key]=input.value
saveData()
}

div.append(label,input)
return div
}


measurementFields.forEach(f=>{
measureSection.appendChild(createInput(f.label,f.key))
})
/* ✅ NEXT ROOM BUTTON (CORRECT PLACE) */
let index = roomOrder.indexOf(room)

let nextBtn=document.createElement("button")

if(index === roomOrder.length - 1){
nextBtn.innerText="Finish ✔"
}else{
nextBtn.innerText=`Next: ${roomOrder[index+1]} →`
}

nextBtn.style.marginTop="10px"

nextBtn.onclick=()=>goToNextRoom(room)

container.appendChild(nextBtn)

/* 🔥 PHOTO SECTION (ADVANCED) */
let photoSection=createAccordion("Site Photographs")

const surfaces = ["NW","EW","SW","WW","Ceiling","Floor"]

surfaces.forEach(surface=>{

let block=document.createElement("div")
block.className="questionBlock"

let title=document.createElement("label")
title.innerText=surface
block.appendChild(title)

/* ADD BUTTON */
let btn=document.createElement("button")
btn.innerText="Add Photo"
btn.onclick=()=>openCamera(surface, room)
block.appendChild(btn)

/* IMAGE LIST */
let list=document.createElement("div")
list.style.display="flex"
list.style.flexWrap="wrap"
list.style.gap="8px"

let photos = r.photos[surface] || []

photos.forEach((p,idx)=>{
let img=document.createElement("img")
img.src=p
img.style.width="80px"
img.style.cursor="pointer"

img.onclick=()=>openEditor(surface, room, idx)

list.appendChild(img)
})

block.appendChild(list)
photoSection.appendChild(block)

})
  
}

function generateExcel(){
saveData()
let rows=[]
Object.keys(data.rooms).forEach(room=>{
let r=data.rooms[room]
Object.entries(r.wall).forEach(([k,v])=>{
if(k.endsWith("-c")) return
rows.push({...data.project,...data.constraints,Room:room,Section:"Wall",Item:k,Value:v,Walls:(r.wallSel[k]||[]).join(","),Comments:r.wall[k+"-c"]||""})
})
Object.entries(r.room).forEach(([k,v])=>{
if(k.endsWith("-c")) return
rows.push({...data.project,...data.constraints,Room:room,Section:"Room",Item:k,Value:v,Comments:r.room[k+"-c"]||""})
})
})
let wb=XLSX.utils.book_new()

/* EXISTING SHEET */
let ws=XLSX.utils.json_to_sheet(rows)
XLSX.utils.book_append_sheet(wb,ws,"Validation Data")

/* 🔥 NEW MEASUREMENT SHEET */
let measureRows=[]

Object.keys(data.rooms).forEach(room=>{
let m=data.rooms[room].measurement || {}

let row = {
Room: room
}

measurementFields.forEach(f=>{
row[f.key] = m[f.key] || ""
})

measureRows.push(row)
console.log("Generating Excel...")
})


let ws2=XLSX.utils.json_to_sheet(measureRows)
XLSX.utils.book_append_sheet(wb,ws2,"Measurements")

XLSX.writeFile(wb,"site_validation.xlsx")
}
  
function openCamera(surface, room){

let input=document.createElement("input")
input.type="file"
input.accept="image/*"
input.capture="environment"

input.onchange=(e)=>{
let file=e.target.files[0]
if(file) processImage(file, surface, room)
}

input.click()
}

function processImage(file, surface, room){

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()
img.src=e.target.result

img.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

let maxWidth=800
let scale=maxWidth/img.width

canvas.width=maxWidth
canvas.height=img.height*scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

let compressed=canvas.toDataURL("image/jpeg",0.6)

/* STORE */
data.rooms[room].photos[surface].push(compressed)

saveData()
openRoom(room)

}
}

reader.readAsDataURL(file)
}
  
function addRoom(){
let name=prompt("Room name")
if(!name)return
roomOrder.push(name)
data.rooms[name]={room:{},wall:{},wallSel:{},measurement:{}}
renderTabs(name)
}
function openEditor(surface, room, index){

let imgSrc = data.rooms[room].photos[surface][index]

let win = window.open()

win.document.write(`
<html>
<body style="margin:0">
<canvas id="c"></canvas>

<div style="position:fixed;top:10px;left:10px;">
<button onclick="mode='draw'">Draw</button>
<button onclick="mode='text'">Text</button>
<button onclick="save()">Save</button>
</div>

<script>
let canvas=document.getElementById("c")
let ctx=canvas.getContext("2d")

let img=new Image()
img.src="${imgSrc}"

let mode="draw"
let drawing=false

img.onload=function(){
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}

canvas.onmousedown=()=>drawing=true
canvas.onmouseup=()=>drawing=false

canvas.onmousemove=(e)=>{
if(mode==="draw" && drawing){
ctx.lineWidth=3
ctx.strokeStyle="red"
ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()
ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)
}
}

canvas.onclick=(e)=>{
if(mode==="text"){
let txt=prompt("Enter note")
if(txt){
ctx.fillStyle="red"
ctx.font="16px Arial"
ctx.fillText(txt,e.offsetX,e.offsetY)
}
}
}

function save(){
let data=canvas.toDataURL("image/jpeg",0.7)
window.opener.saveAnnotated("${room}","${surface}",${index},data)
window.close()
}
<\/script>

</body>
</html>
`)
}
function saveAnnotated(room, surface, index, dataURL){
data.rooms[room].photos[surface][index]=dataURL
saveData()
openRoom(room)
}
  
  function goToNextRoom(currentRoom){

let index = roomOrder.indexOf(currentRoom)

if(index === -1) return

// If last room → alert
if(index === roomOrder.length - 1){
alert("All rooms completed ✅")
return
}

let nextRoom = roomOrder[index + 1]

// Open next room
openRoom(nextRoom)

// Scroll to top
window.scrollTo({top:0,behavior:"smooth"})
}
function renderSociety(){

const container=document.getElementById("societyForm")
container.innerHTML=""

societyQuestions.forEach(q=>{

let div=document.createElement("div")
div.className="formGroup"

let label=document.createElement("label")
label.className="formLabel"
label.innerText = q.label

let input

if(q.type==="textarea"){
input=document.createElement("textarea")
}else{
input=document.createElement("select")
input.innerHTML="<option></option>" + q.options.map(o=>`<option>${o}</option>`).join("")
}

input.id=q.key
input.value=(data.constraints && data.constraints[q.key]) || ""

input.onchange=saveData

div.append(label,input)
container.appendChild(div)

})

}
function resetData(){
localStorage.clear()
location.reload()
}

document.addEventListener("DOMContentLoaded",()=>{
renderTabs(defaultRooms[0])
openRoom(defaultRooms[0])
renderSociety()
})

</script>

</body>
</html>
