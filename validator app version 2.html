<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Livspace-Site Validation Tool</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#1e3d8f;color:white;padding:14px;font-size:18px}
.container{padding:14px;max-width:1200px;margin:auto}
.card{background:white;padding:16px;margin-bottom:14px;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

label{font-weight:600;font-size:13px}
input,textarea{width:100%;padding:6px;border-radius:6px;border:1px solid #ccc}
textarea{height:50px}

button{padding:8px 12px;border:none;background:#1e3d8f;color:white;border-radius:6px;margin:4px;cursor:pointer}

.roomTab{display:inline-block;padding:8px 12px;border:1px solid #ccc;margin:3px;border-radius:6px;cursor:pointer}

.wallBox{display:flex;gap:12px;margin-top:6px}

.accordion{cursor:pointer;background:#eef2ff;padding:10px;border-radius:6px;margin-top:10px}
.accordionContent{display:none;padding-top:10px}

.questionBlock{padding:8px;border-radius:6px;margin-bottom:8px}
.statusAnswered{background:#e6f7e6}
.statusPending{background:#ffe6e6}

.progressBar{height:8px;background:#ddd;border-radius:4px;margin-top:6px}
.progressFill{height:100%;background:#1e3d8f;border-radius:4px}

.summaryBox{background:#f9fafc;padding:10px;border-radius:6px;margin-bottom:10px}

/* 🔥 TOGGLE */
.toggleGroup{display:flex;gap:6px;margin-top:6px}
.toggleBtn{padding:6px 10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff}
.toggleBtn.active.yes{background:#28a745;color:#fff}
.toggleBtn.active.no{background:#dc3545;color:#fff}
.toggleBtn.active.na{background:#6c757d;color:#fff}
</style>
</head>

<body>

<header>Livspace - Site Validation Tool</header>

<div class="container">

<div class="card">
<h3>Preliminary Project Details</h3>

<div style="display:flex;flex-direction:column;gap:12px;">

<input id="pid" placeholder="PID" onchange="saveData()">
<input id="cx" placeholder="Cx Name" onchange="saveData()">

<input id="city" list="cityList" placeholder="Select or type City" onchange="saveData()">
<datalist id="cityList">
<option value="Delhi">
<option value="Mumbai">
<option value="Bangalore">
<option value="Hyderabad">
<option value="Chennai">
<option value="Pune">
<option value="Kolkata">
<option value="Ahmedabad">
<option value="Jaipur">
<option value="Gurgaon">
<option value="Noida">
</datalist>

<input id="address" placeholder="Address" onchange="saveData()">
<input id="society" placeholder="Society Name" onchange="saveData()">
<input id="flat" placeholder="Flat No" onchange="saveData()">
<input id="floorNo" placeholder="Floor No" onchange="saveData()">
<button id="startValidationBtn" onclick="startValidation()">Start Validation</button>
</div>
</div>
  
<div id="validationApp" style="display:none;">

<div class="card">
<h3>Work environment & Society Constraints</h3>
<div id="societyForm" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>

<div class="card">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
<button onclick="resetData()">Reset Data</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">
<button onclick="generateExcel()">Generate Excel</button>
<button onclick="downloadAllImages()">Download Images</button>
<button id="endValidationBtn" onclick="endValidation()">End Validation</button>
</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]
/* 🔥 MEASUREMENT CONFIG */

const measurementFields = [

{label:"Floor to Ceiling - Corner 1 (mm)", key:"fc1"},

const roomQuestions=[
"Existing flooring in good condition with appropriate slope/levels?",
"Is existing skirting flushed?",   
"In case of room extesnion is there a requirement to level the floors?Ex : balcony extensions",
"Can we do tile on tile installation?", 
"Are existing walls in plumb/line and level? Capture room diagonals in measurement section", 
"Is there level difference in the true ceiling?Capture floor to ceiling dimesions in measurement section",
"Are there any issues with the existing false ceiling that require removal and replacement?",                   
"Are there visible undulations or uneven surface on the true ceiling?Mention treatment required in comments",
"Are there any utilities (sprinkler pipes, plumbing line, ducts) or cross beams running on the ceiling? Capture the beam bottom to floor mesurement(in mm), Sprinkler head to Floor measurement(in mm) in mesurements section",
"Is there any evidence of water leaks or moisture damage on the existing true ceiling?Mark on the layout as well and inform Cx",                    
"Are the existing doors and door frame in good condition?",
"Do we have sufficient opening available for furniture movement/shifting?Capture door height and width in measurement section",

"Are existing plumbing lines old and outdated and may not be compatible with modern fixtures?",
"Are existing plumbing lines CPVC/UPVC?", 
"Is the main inlet valve accesible?",

const wallQuestions=["Is the wall a load-bearing wall/mivan construction/sheer wall?Mark in the structural layout as well",
"Is the wall dry wall or gypsum wall?Mark in the structural layout as well",
"Are there niches present?Mark in the structural layout as well",                     
"Are there major cracks that require structural repair?Mark in the structural layout as well",
"Are there hairline crack/minor cracks/loose plaster requiring re plastering?? Mark in the structural layout as well",
"Does the existing wall surface have undulations or uneven surface?Capture mesurements in measurement section",
"Are there evidence of water seepage or dampness that require waterproofing treatment? Mark on the structural layout as well and inform Cx",
"Is there a suitable location for core cut available?",
"Are existing switches and sockets in working condition?Capture wall wise modules and configuration in the comments and mark on layout",
"Is there a AC point(low side works) provided?",
"Can split AC be installed post false ceiling w/o pockets? Capture Wall wise Door/Window Soffit to Ceiling measurement in mesurement section",
"Is panelling/pelmet required to be done for AC installation?",
"Are there any darker shade on the wall?",
"Is the existing paint in good condition, without excessive peeling, flaking, or bubbling?"

const defaultRooms=["Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"]
let approxSizeMB = parseFloat(localStorage.getItem("dbSizeMB") || "0")
let db

function initDB(){
return new Promise((resolve, reject)=>{
let request = indexedDB.open("SiteValidatorDB", 1)

request.onupgradeneeded = function(e){
db = e.target.result

if(!db.objectStoreNames.contains("photos")){
db.createObjectStore("photos", { keyPath: "id" })
}
}

request.onsuccess = function(e){
db = e.target.result
resolve()
}

request.onerror = reject
})
}  
  
let roomOrder=[...defaultRooms]
let data=JSON.parse(localStorage.getItem("validatorData")||"{}")
if (!data.validationMeta) data.validationMeta = {}

if (data.validationMeta.started === undefined) data.validationMeta.started = false
if (data.validationMeta.ended === undefined) data.validationMeta.ended = false
  

function normalizeData(){
if(!data.rooms)data.rooms={}
defaultRooms.forEach(r=>{
if(!data.rooms[r])data.rooms[r]={room:{},wall:{},wallSel:{},measurement:{},photos: {
  "NW": [],
  "EW": [],
  "SW": [],
  "WW": [],
  "Ceiling": [],
  "Floor": []
}}
})
}
normalizeData()

function saveData(){
data.project={pid:pid.value,cx:cx.value,city:city.value,address:address.value,society:society.value,flat:flat.value,floorNo:floorNo.value}
data.constraints={}

societyQuestions.forEach(q=>{
let el=document.getElementById(q.key)
if(el) data.constraints[q.key]=el.value
})
localStorage.setItem("validatorData",JSON.stringify(data))
}
function startValidation(){

    if(!pid.value || !cx.value || !city.value){
        alert("Please fill PID, Cx Name, City")
        return
    }

    if(!confirm("Start validation? Project details will be locked.")){
        return
    }

    data.validationMeta.started = true
    data.validationMeta.ended = false
    data.validationMeta.startTime = new Date().toLocaleString()

    saveData()

    renderAppSections()

    // ✅ CRITICAL FIX (THIS WAS MISSING)
    renderSociety()

    renderTabs(defaultRooms[0])
    openRoom(defaultRooms[0])
}
function endValidation(){

    if(!data.validationMeta.started){
        alert("Validation not started")
        return
    }

    if(data.validationMeta.ended){
        alert("Already completed")
        return
    }

    if(!confirm("End validation? This will lock all data.")){
        return
    }

    data.validationMeta.ended = true
    data.validationMeta.endTime = new Date().toLocaleString()

    saveData()
    renderAppSections()

    alert("Validation completed ✅")
}
function renderAppSections(){

    let app = document.getElementById("validationApp")
    let startBtn = document.getElementById("startValidationBtn")
    let endBtn = document.getElementById("endValidationBtn")

    if(data.validationMeta.started){

        app.style.display = "block"
        startBtn.style.display = "none"

        if(data.validationMeta.ended){
            endBtn.style.display = "none"
        } else {
            endBtn.style.display = "inline-block"
        }
        renderSociety()
        // ✅ ALWAYS ensure tabs visible
        if(roomOrder.length > 0){
            renderTabs(roomOrder[0])
        }

    } else {

        app.style.display = "none"
        startBtn.style.display = "inline-block"
        endBtn.style.display = "none"
    }

    // 🔒 Lock project fields
    ["pid","cx","city","address","society","flat","floorNo"].forEach(id=>{
        let el = document.getElementById(id)
        if(el) el.disabled = data.validationMeta.started
    })
}
  
function renderTabs(activeRoom){

const container = document.getElementById("roomTabs")

container.innerHTML = roomOrder.map(r=>`
<span class="roomTab" 
style="${r===activeRoom ? 'background:#1e3d8f;color:white' : ''}"
onclick="openRoom('${r}')">
${r}
</span>
`).join("");

}

function scrollToNext(currentDiv){
let all=document.querySelectorAll(".statusPending")
for(let el of all){
if(el.offsetTop>currentDiv.offsetTop){
el.scrollIntoView({behavior:"smooth",block:"center"})
break
}
}
}

/* 🔥 TOGGLE FUNCTION */
function createToggle(value,onChange){
let div=document.createElement("div")
div.className="toggleGroup"

let options=["Yes","No","NA"]

options.forEach(opt=>{
let btn=document.createElement("div")
btn.className="toggleBtn"
btn.innerText=opt

btn.onclick=()=>{
div.querySelectorAll(".toggleBtn").forEach(b=>b.classList.remove("active","yes","no","na"))

btn.classList.add("active")
btn.classList.add(opt.toLowerCase())

onChange(opt)
}

if(value===opt){
btn.classList.add("active")
btn.classList.add(opt.toLowerCase())
}

div.appendChild(btn)
})

return div
}

function applyAllWalls(value, room){
const r=data.rooms[room]
wallQuestions.forEach(q=>{r.wall[q]=value})
saveData()
openRoom(room)
}

function openRoom(room){
if(data.validationMeta?.ended){
    alert("Validation completed. Editing disabled.")
    return
}
 if(!data.rooms[room]){
    data.rooms[room] = {
        room:{},wall:{},wallSel:{},measurement:{},
        photos:{NW:[],EW:[],SW:[],WW:[],Ceiling:[],Floor:[]}
    }
} 
const r=data.rooms[room]
renderTabs(room)

const container=document.getElementById("roomForm")
container.innerHTML=""

function createAccordion(title){
let acc=document.createElement("div")
acc.className="accordion"
acc.textContent=title
let content=document.createElement("div")
content.className="accordionContent"
let isOpen = data.uiState?.[title] || false

acc.onclick=()=>{
isOpen = !isOpen
if(!data.uiState) data.uiState={}
data.uiState[title] = isOpen
content.style.display = isOpen ? "block" : "none"
}
container.appendChild(acc)
container.appendChild(content)

return content
  
}

/* WALL */
let wallSection=createAccordion("Wall Questions")

wallSection.innerHTML+=`
<button onclick="applyAllWalls('Yes','${room}')">Apply Yes to All</button>
<button onclick="applyAllWalls('No','${room}')">Apply No to All</button>
`

let div=document.createElement("div")
div.className="questionBlock "+(r.wall[q]?"statusAnswered":"statusPending")

let label=document.createElement("label")
label.textContent=q

let toggle=createToggle(r.wall[q], val=>{
r.wall[q]=val
saveData()
div.className="questionBlock "+(val?"statusAnswered":"statusPending")
scrollToNext(div)
})

let wallBox=document.createElement("div")
wallBox.className="wallBox"

walls.forEach(w=>{
let cb=document.createElement("input")
cb.type="checkbox"
let arr=r.wallSel[q]||[]
cb.checked=arr.includes(w)

cb.onchange=()=>{
let arr=r.wallSel[q]||[]
if(cb.checked){if(!arr.includes(w))arr.push(w)}
else{arr=arr.filter(x=>x!==w)}
r.wallSel[q]=arr
saveData()
}
wallBox.append(cb,w)
})

let textarea=document.createElement("textarea")
textarea.value=r.wall[q+"-c"]||""

textarea.oninput=()=>{
r.wall[q+"-c"]=textarea.value
saveData()
}

div.append(label,toggle,wallBox,textarea)
wallSection.appendChild(div)
})

/* ROOM */

roomQuestions.forEach(q=>{

let label=document.createElement("label")

let toggle=createToggle(r.room[q], val=>{
r.room[q]=val
saveData()
div.className="questionBlock "+(val?"statusAnswered":"statusPending")
scrollToNext(div)
})

let textarea=document.createElement("textarea")
textarea.value=r.room[q+"-c"]||""

textarea.oninput=()=>{
r.room[q+"-c"]=textarea.value

div.append(label,toggle,textarea)
roomSection.appendChild(div)

/* 🔥 MEASUREMENT SECTION */
let measureSection=createAccordion("Measurement Section")

let m = r.measurement || {}
r.measurement = m

function createInput(labelText,key){

let div=document.createElement("div")
div.className="questionBlock"

let label=document.createElement("label")
label.innerText=labelText

let input=document.createElement("input")
input.type="number"
input.placeholder="mm"
input.value=m[key] || ""

input.onchange=()=>{
m[key]=parseFloat(input.value) || ""
saveData()
}

div.append(label,input)
return div
}


measurementFields.forEach(f=>{
measureSection.appendChild(createInput(f.label,f.key))
})
/* 🔥 PHOTO SECTION (ADVANCED) */
let photoSection=createAccordion("Site Photographs")
photoSection.setAttribute("data-section","photo")

refreshPhotoSection(room) 
/* ✅ NEXT ROOM BUTTON (CORRECT PLACE) */
let index = roomOrder.indexOf(room)

let nextBtn=document.createElement("button")

if(index === roomOrder.length - 1){
nextBtn.innerText="Finish ✔"
}else{
nextBtn.innerText=`Next: ${roomOrder[index+1]} →`
}

nextBtn.style.marginTop="10px"

nextBtn.onclick=()=>goToNextRoom(room)

container.appendChild(nextBtn)


  
}

function savePhotoToDB(id, dataURL){
return new Promise((resolve, reject)=>{
let tx = db.transaction(["photos"], "readwrite")
let store = tx.objectStore("photos")

store.put({ id, data: dataURL })

tx.oncomplete = ()=>resolve()
tx.onerror = reject
})
}
function getPhotoFromDB(id){
return new Promise((resolve, reject)=>{
let tx = db.transaction(["photos"], "readonly")
let store = tx.objectStore("photos")

let req = store.get(id)

req.onsuccess = ()=>resolve(req.result?.data)
req.onerror = reject
})
}  
function deletePhotoFromDB(id){
let tx = db.transaction(["photos"], "readwrite")
let store = tx.objectStore("photos")
store.delete(id)
}

  
function generateExcel(){

if (!data.validationMeta) data.validationMeta = {}

data.validationMeta.endTime = data.validationMeta.endTime || new Date().toLocaleString()

normalizeData()

roomOrder.forEach(room=>{
if(!data.rooms[room]){
data.rooms[room]={
room:{},wall:{},wallSel:{},measurement:{},
photos:{NW:[],EW:[],SW:[],WW:[],Ceiling:[],Floor:[]}
}
}
})

saveData()

let rows=[]

Object.keys(data.rooms).forEach(room=>{

let r = data.rooms[room]

wallQuestions.forEach(q=>{
rows.push({
...data.project,
Room: room,
Section: "Wall",
Item: q,
Value: r.wall[q] || "",
Walls: (r.wallSel[q] || []).join(","),
Comments: r.wall[q+"-c"] || ""
})
})

roomQuestions.forEach(q=>{
rows.push({
...data.project,
Room: room,
Section: "Room",
Item: q,
Value: r.room[q] || "",
Comments: r.room[q+"-c"] || ""
})
})

})

let wb = XLSX.utils.book_new()

let ws = XLSX.utils.json_to_sheet(rows)
XLSX.utils.book_append_sheet(wb, ws, "Validation Data")

/* ✅ MEASUREMENT WITH TIMESTAMPS */
let measureRows=[]

Object.keys(data.rooms).forEach(room=>{

let m = data.rooms[room].measurement || {}

let row = { 
    Room: room,
    Validation_Start: data.validationMeta?.startTime || "",
    Validation_End: data.validationMeta?.endTime || ""
}

measurementFields.forEach(f=>{
row[f.key] = m[f.key] || ""
})

measureRows.push(row)

})

let ws2 = XLSX.utils.json_to_sheet(measureRows)
XLSX.utils.book_append_sheet(wb, ws2, "Measurements")

/* ✅ SUMMARY SHEET */
let summary = [{
PID: data.project?.pid || "",
Cx: data.project?.cx || "",
Start_Time: data.validationMeta?.startTime || "",
End_Time: data.validationMeta?.endTime || ""
}]

let wsSummary = XLSX.utils.json_to_sheet(summary)
XLSX.utils.book_append_sheet(wb, wsSummary, "Summary")

/* CONSTRAINTS */
let constraintRows = []

societyQuestions.forEach(q=>{
constraintRows.push({
Category: q.category,
Question: q.label,
Value: (data.constraints && data.constraints[q.key]) || ""
})
})

let ws3 = XLSX.utils.json_to_sheet(constraintRows)
XLSX.utils.book_append_sheet(wb, ws3, "Society Constraints")

XLSX.writeFile(wb, "site_validation.xlsx")
}

function processImage(file, surface, room){

let img = new Image()

// 🔥 USE OBJECT URL INSTEAD OF BASE64
let url = URL.createObjectURL(file)

img.src = url

img.onload = function(){

let canvas = document.createElement("canvas")
let ctx = canvas.getContext("2d")

// 🔥 REDUCE SIZE (VERY IMPORTANT FOR MOBILE)
let maxWidth = 800
let scale = maxWidth / img.width

canvas.width = maxWidth
canvas.height = img.height * scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

// 🔥 COMPRESS IMAGE
let compressed = canvas.toDataURL("image/jpeg", 0.4)

// 🔥 CLEAN MEMORY
URL.revokeObjectURL(url)

// 🔥 OPEN EDITOR
openEditorDirect(compressed, surface, room)

}
}
  
async function openEditorDirect(imgSrc, surface, room, index = null){
if(document.getElementById("editorCanvas")){
return
}

document.body.style.overflow = "hidden"

let overlay = document.createElement("div")
overlay.style.position = "fixed"
overlay.style.top = 0
overlay.style.left = 0
overlay.style.width = "100%"
overlay.style.height = "100%"
overlay.style.background = "#000"
overlay.style.zIndex = 9999

overlay.innerHTML = `
<div style="position:absolute;top:10px;left:10px;z-index:10;">
<button id="drawBtn">Draw</button>
<button id="textBtn">Text</button>
<button id="saveBtn">Save</button>
<button id="closeBtn">Close</button>
</div>

<canvas id="editorCanvas"></canvas>
`

document.body.appendChild(overlay)
let canvas = overlay.querySelector("#editorCanvas")
let ctx = canvas.getContext("2d")

canvas.style.touchAction = "none"
  /* CLOSE */
overlay.querySelector("#closeBtn").onclick = () => {
document.body.style.overflow = "auto"
canvas.replaceWith(canvas.cloneNode(true))
document.body.removeChild(overlay)
}
  
/* SAVE */

overlay.querySelector("#saveBtn").onclick = async () => {

if(approxSizeMB > 80){
alert("Storage almost full. Please delete some images.")
return
} 
let btn = overlay.querySelector("#saveBtn")
btn.innerText = "Saving..."
btn.disabled = true

try{

let finalImg = canvas.toDataURL("image/jpeg", 0.7)

let id = "img_" + Date.now()

await savePhotoToDB(id, finalImg)
approxSizeMB += finalImg.length / (1024*1024)
localStorage.setItem("dbSizeMB", approxSizeMB)

if(index !== null){
data.rooms[room].photos[surface][index] = id
}else{
data.rooms[room].photos[surface].push(id)
}

saveData()
refreshPhotoSection(room)

document.body.style.overflow = "auto"
canvas.replaceWith(canvas.cloneNode(true))
document.body.removeChild(overlay)

}catch(err){
console.error(err)
alert("Error saving image")
btn.innerText = "Save"
btn.disabled = false
}
}
/* 🔥 CRITICAL: STOP SCROLL + ZOOM */


/* STATE */
let mode = "draw"
let drawing = false
function getCoords(e){
const rect = canvas.getBoundingClientRect()

const scaleX = canvas.width / rect.width
const scaleY = canvas.height / rect.height

return {
x: (e.clientX - rect.left) * scaleX,
y: (e.clientY - rect.top) * scaleY
}
}
/* LOAD IMAGE */
let img = new Image()
img.src = imgSrc

img.onerror = ()=>{
alert("Image failed to load")
document.body.removeChild(overlay)
}

img.onload = ()=>{
canvas.width = img.width*0.9
canvas.height = img.height*0.9

canvas.style.width = "100%"
canvas.style.height = "auto"

ctx.drawImage(img, 0, 0)
}

/* BUTTONS */
overlay.querySelector("#drawBtn").onclick = () => mode = "draw"
overlay.querySelector("#textBtn").onclick = () => mode = "text"

/* DRAW (WORKS ON MOBILE + DESKTOP) */
canvas.addEventListener("pointerdown", (e)=>{
if(mode !== "draw") return

drawing = true
canvas.setPointerCapture(e.pointerId)

ctx.beginPath()
let p = getCoords(e)
ctx.moveTo(p.x, p.y)
})

canvas.addEventListener("pointermove", (e)=>{
if(!drawing || mode !== "draw") return

ctx.lineCap = "round"
ctx.lineJoin = "round"
ctx.strokeStyle = "red"
ctx.lineWidth = 15

let p = getCoords(e)

ctx.lineTo(p.x, p.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(p.x, p.y)
})

canvas.addEventListener("pointerup", (e)=>{
drawing = false
try{ canvas.releasePointerCapture(e.pointerId) }catch(err){}
})

canvas.addEventListener("pointercancel", ()=>{
drawing = false
})

/* TEXT */
canvas.addEventListener("click", (e)=>{
if(mode === "text"){
let txt = prompt("Enter note")
if(txt){
ctx.fillStyle = "red"
ctx.font = "68px Arial"
let p = getCoords(e)
ctx.fillText(txt, p.x, p.y)
}
}
})


}

function renderSociety(){

const container=document.getElementById("societyForm")
container.innerHTML=""

let grouped = {}

societyQuestions.forEach(q=>{
if(!grouped[q.category]) grouped[q.category]=[]
grouped[q.category].push(q)
})

const order = [
"General",
"Soft Cost Identification",
"Access and Delivery constraints",
"Execution Constraints",
"Material Specification Constraint"
];

order.forEach(category=>{

if(!grouped[category]) return;

let header=document.createElement("h4")
header.innerText = category
header.style.marginTop = "15px"
header.style.color = "#1e3d8f"

container.appendChild(header)

grouped[category].forEach(q=>{

let div=document.createElement("div")

let label=document.createElement("label")
label.innerText = q.label

let input

if(q.type==="textarea"){
input=document.createElement("textarea")

}else if(q.type==="number"){
input=document.createElement("input")
input.type="number"

}else if(q.options){
input=document.createElement("select")
input.innerHTML="<option></option>" + q.options.map(o=>`<option>${o}</option>`).join("")

}else{
input=document.createElement("input")
input.type="text"
}

input.id=q.key
input.value=(data.constraints && data.constraints[q.key]) || ""
input.onchange=saveData

div.append(label,input)
container.appendChild(div)

})

})

}
function refreshPhotoSection(room){

let r = data.rooms[room]

/* GET PHOTO SECTION */
let photoSection = document.querySelector("[data-section='photo']")

if(!photoSection) return

/* PRESERVE OPEN STATE */
let wasOpen = photoSection && photoSection.style.display === "block"

/* CLEAR */
photoSection.innerHTML = ""

const surfaces = ["NW","EW","SW","WW","Ceiling","Floor"]

surfaces.forEach(surface=>{

let block=document.createElement("div")
block.className="questionBlock"

/* TITLE */
let title=document.createElement("label")
title.innerText=surface
block.appendChild(title)

/* ADD BUTTON */
let btn=document.createElement("button")
btn.innerText="Add Photo"
btn.onclick=()=>openCamera(surface, room)
block.appendChild(btn)

/* IMAGE LIST */
let list=document.createElement("div")
list.style.display="flex"
list.style.flexWrap="wrap"
list.style.gap="8px"

let photos = r.photos[surface] || []

photos.forEach((photo, idx)=>{

/* WRAPPER */
let wrapper = document.createElement("div")
wrapper.style.position = "relative"
wrapper.style.display = "inline-block"

/* IMAGE */
let img=document.createElement("img")
getPhotoFromDB(photo).then(src=>{
if(src){
img.src = src
}else{
img.src = "https://via.placeholder.com/80?text=No+Image"
}
})

img.onerror = ()=>{
img.src = "https://via.placeholder.com/80?text=Error"
}
img.style.width="80px"
img.style.cursor="pointer"

img.onclick = async ()=>{

let src = await getPhotoFromDB(photo)

openEditorDirect(src, surface, room, idx)
}

/* DELETE BUTTON */
let del=document.createElement("div")
del.innerText="✕"
del.style.position="absolute"
del.style.top="0"
del.style.right="0"
del.style.background="red"
del.style.color="white"
del.style.cursor="pointer"
del.style.fontSize="12px"
del.style.padding="2px 5px"
del.style.borderRadius="0 6px 0 6px"

/* DELETE ACTION */
del.onclick=(e)=>{
e.stopPropagation()

if(confirm("Delete this photo?")){

let id = data.rooms[room].photos[surface][idx]

deletePhotoFromDB(id)

data.rooms[room].photos[surface].splice(idx,1)

saveData()
refreshPhotoSection(room)
}
}

/* APPEND */
wrapper.appendChild(img)
wrapper.appendChild(del)

list.appendChild(wrapper)
})

block.appendChild(list)
photoSection.appendChild(block)
})

/* RESTORE STATE */
if(wasOpen){
photoSection.style.display = "block"
}
}
function resetData(){

if(confirm("This will delete all data including photos. Continue?")){

    let req = indexedDB.deleteDatabase("SiteValidatorDB")

    req.onsuccess = ()=>{

        localStorage.removeItem("validatorData")
        localStorage.removeItem("dbSizeMB")

        // ✅ FULL RESET
        data = {}
        location.reload()
    }
}
}
async function downloadAllImages(){

for(let room in data.rooms){

let r = data.rooms[room]

for(let surface in r.photos){

let photos = r.photos[surface] || []

for(let i=0;i<photos.length;i++){

let id = photos[i]

let src = await getPhotoFromDB(id)

if(!src) continue

let a = document.createElement("a")
a.href = src
a.download = `${room}_${surface}_${i+1}.jpg`

document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}
}
}

alert("All images downloaded ✅")

}
